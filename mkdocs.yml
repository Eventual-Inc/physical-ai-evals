site_name: physical-ai-evals
site_description: >-
  The starter kit for evaluating physical-AI policies on LIBERO-shaped benchmarks —
  reproducible VLA rollouts with queryable failure forensics.
site_url: https://eventual-inc.github.io/physical-ai-evals/
repo_url: https://github.com/Eventual-Inc/physical-ai-evals
repo_name: Eventual-Inc/physical-ai-evals
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
    - toc.follow

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - The write-up: BLOG_POST.md
  - Evaluation patterns: EVAL_PATTERNS.md
  - Friction:
      - Friction points: FRICTION_POINTS.md
      - Friction log: FRICTION_LOG.md

exclude_docs: |
  BLOG_OUTLINE.md
